<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLT | Inventario POS</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        h1 { color: #000080; text-align: center; } 
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input:focus { border-color: #000080; outline: none; }
        
        /* Contenedor flexible para el input y el botón de cámara */
        .input-con-boton { display: flex; gap: 10px; }
        .btn-camara { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-camara:hover { background-color: #218838; }

        .btn-main { background-color: #000080; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; margin-bottom: 20px;}
        .btn-main:hover { background-color: #000050; }
        
        .btn-accion { padding: 6px 12px; margin: 0 2px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-mas { background-color: #28a745; } 
        .btn-menos { background-color: #ffc107; color: #333; } 
        .btn-danger { background-color: #dc3545; } 
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #000080; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        td:nth-child(2) { text-align: left; } 
        td:nth-child(6) { min-width: 120px; } 

        /* Estilo para el recuadro de la cámara */
        #lector-codigo { width: 100%; max-width: 400px; margin: 10px auto; display: none; border: 2px solid #000080; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <h1>REVOLT | Gestión de Inventario</h1>

        <div class="form-group">
            <label for="idProducto">ID / Código de Barras:</label>
            <div class="input-con-boton">
                <input type="text" id="idProducto" placeholder="Escanea el código o escríbelo manual">
                <button type="button" class="btn-camara" onclick="iniciarEscaner()">📷 Escanear</button>
            </div>
            <div id="lector-codigo"></div>
        </div>

        <div class="form-group">
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" placeholder="Ej: Cable HDMI Vention 2.1">
        </div>
        <div class="form-group">
            <label for="compra">Valor de Compra ($):</label>
            <input type="number" id="compra" placeholder="Ej: 15000">
        </div>
        <div class="form-group">
            <label for="venta">Valor de Venta ($):</label>
            <input type="number" id="venta" placeholder="Ej: 30000">
        </div>
        <div class="form-group">
            <label for="stock">Cantidad en Stock:</label>
            <input type="number" id="stock" placeholder="Ej: 10">
        </div>
        <button class="btn-main" onclick="guardarProducto()">Guardar Producto</button>

        <h2>Inventario Actual</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Compra</th>
                        <th>Venta</th>
                        <th>Stock</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaInventario">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let html5QrCode;

        function iniciarEscaner() {
            document.getElementById('lector-codigo').style.display = 'block';
            
            // Si ya hay un escáner activo, lo detenemos primero
            if(html5QrCode) {
                html5QrCode.stop().catch(err => console.log(err));
            }

            html5QrCode = new Html5Qrcode("lector-codigo");
            
            html5QrCode.start(
                { facingMode: "environment" }, // Usa la cámara trasera del celular
                {
                    fps: 10,    // Fotogramas por segundo
                    qrbox: { width: 250, height: 150 } // Cuadro de enfoque para código de barras
                },
                (codigoDecodificado) => {
                    // ÉXITO: Detiene la cámara y pone el código en el input
                    document.getElementById('idProducto').value = codigoDecodificado;
                    
                    // Reproducir un pitido (opcional, muy pro)
                    let beep = new Audio('https://www.soundjay.com/button/beep-07.wav');
                    beep.play();

                    html5QrCode.stop().then(() => {
                        document.getElementById('lector-codigo').style.display = 'none';
                        // Pasa el cursor automáticamente al nombre del producto
                        document.getElementById('nombre').focus(); 
                    });
                },
                (mensajeError) => {
                    // Ignoramos los errores mientras intenta enfocar
                }
            ).catch((err) => {
                alert("Error al iniciar la cámara. Asegúrate de darle permisos al navegador.");
            });
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tus llaves de REVOLT
        const firebaseConfig = {
            apiKey: "AIzaSyBY3EAZAhJnlKEPfeY7SfTlW5PxkXI59d8",
            authDomain: "revolt-inventario.firebaseapp.com",
            projectId: "revolt-inventario",
            storageBucket: "revolt-inventario.firebasestorage.app",
            messagingSenderId: "738514103146",
            appId: "1:738514103146:web:8c32dd5fac960d4e505313"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.guardarProducto = async function() {
            const idProd = document.getElementById('idProducto').value;
            const nombre = document.getElementById('nombre').value;
            const compra = document.getElementById('compra').value;
            const venta = document.getElementById('venta').value;
            const stock = document.getElementById('stock').value;

            if(!idProd || !nombre || !compra || !venta || !stock) {
                alert("Por favor, llena todos los campos.");
                return;
            }

            try {
                await addDoc(collection(db, "productos"), {
                    codigo: idProd,
                    nombre: nombre,
                    precio_compra: Number(compra),
                    precio_venta: Number(venta),
                    stock: Number(stock)
                });
                
                document.getElementById('idProducto').value = '';
                document.getElementById('nombre').value = '';
                document.getElementById('compra').value = '';
                document.getElementById('venta').value = '';
                document.getElementById('stock').value = '';
                
            } catch (error) {
                console.error("Error al guardar: ", error);
                alert("Hubo un error al guardar.");
            }
        };

        const referenciaProductos = collection(db, "productos");
        
        onSnapshot(referenciaProductos, (querySnapshot) => {
            const tabla = document.getElementById('tablaInventario');
            tabla.innerHTML = ''; 
            
            querySnapshot.forEach((documento) => {
                const producto = documento.data();
                const fila = `
                    <tr>
                        <td>${producto.codigo}</td>
                        <td>${producto.nombre}</td>
                        <td>$${producto.precio_compra.toLocaleString('es-CO')}</td>
                        <td>$${producto.precio_venta.toLocaleString('es-CO')}</td>
                        <td style="font-size: 1.1em; font-weight: bold;">${producto.stock}</td>
                        <td>
                            <button class="btn-accion btn-menos" onclick="actualizarStock('${documento.id}', ${producto.stock}, -1)">-</button>
                            <button class="btn-accion btn-mas" onclick="actualizarStock('${documento.id}', ${producto.stock}, 1)">+</button>
                            <button class="btn-accion btn-danger" onclick="eliminarProducto('${documento.id}')">X</button>
                        </td>
                    </tr>
                `;
                tabla.innerHTML += fila;
            });
        });

        window.actualizarStock = async function(idFirebase, stockActual, cambio) {
            const nuevoStock = stockActual + cambio;
            if (nuevoStock < 0) {
                alert("El stock no puede ser menor a 0.");
                return;
            }
            try {
                const productoRef = doc(db, "productos", idFirebase);
                await updateDoc(productoRef, { stock: nuevoStock });
            } catch (error) {
                console.error("Error al actualizar: ", error);
            }
        };

        window.eliminarProducto = async function(idFirebase) {
            if(confirm("¿Seguro que deseas eliminar este producto?")) {
                await deleteDoc(doc(db, "productos", idFirebase));
            }
        }
    </script>
</body>
</html>
