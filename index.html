<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLT | Sistema POS e Inventario</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        
        /* CABECERA Y PESTAÑAS */
        .header { background-color: #000080; padding: 15px 20px; color: white; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        
        .tab-menu { overflow: hidden; background-color: #1a1a1a; display: flex; justify-content: center; }
        .tab-menu button { background-color: inherit; color: #bbb; border: none; outline: none; cursor: pointer; padding: 14px 25px; transition: 0.3s; font-size: 16px; font-weight: bold; }
        .tab-menu button:hover { background-color: #333; color: white; }
        .tab-menu button.active { background-color: #f4f4f9; color: #000080; border-top: 4px solid #000080; }

        /* CONTENEDOR PRINCIPAL */
        .tab-content { display: none; padding: 20px; max-width: 1000px; margin: auto; }
        .tab-content.active { display: block; }
        
        .caja-blanca { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }

        /* FORMULARIOS Y BOTONES */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input:focus { border-color: #000080; outline: none; }
        
        .input-con-boton { display: flex; gap: 10px; }
        .btn-camara { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-camara:hover { background-color: #218838; }

        .btn-main { background-color: #000080; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { background-color: #000050; }
        
        .btn-cobrar { background-color: #28a745; font-size: 20px; padding: 15px; margin-top: 10px; }
        .btn-cobrar:hover { background-color: #218838; }

        /* TABLAS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #000080; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        /* DISEÑO DE VENTAS (GRID) */
        .grid-ventas { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 768px) { .grid-ventas { grid-template-columns: 1fr; } }
        
        .total-venta { font-size: 28px; font-weight: bold; color: #000080; text-align: right; margin-top: 15px; border-top: 2px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>REVOLT</h1>
        <small>Professional Technical Service</small>
    </div>

    <div class="tab-menu">
        <button class="tab-links active" onclick="abrirPestana(event, 'PestanaVentas')">💰 CAJA / POS</button>
        <button class="tab-links" onclick="abrirPestana(event, 'PestanaInventario')">📦 INVENTARIO</button>
    </div>

    <div id="PestanaVentas" class="tab-content active">
        <div class="grid-ventas">
            
            <div>
                <div class="caja-blanca">
                    <h3 style="margin-top:0; color: #000080;">Datos del Cliente</h3>
                    <div class="form-group">
                        <input type="text" id="clienteNombre" placeholder="Nombre (Opcional)">
                    </div>
                    <div class="form-group">
                        <input type="number" id="clienteDoc" placeholder="Cédula / NIT (Opcional)">
                    </div>
                </div>

                <div class="caja-blanca">
                    <h3 style="margin-top:0; color: #000080;">Agregar al Carrito</h3>
                    <div class="form-group">
                        <label>Buscar / Escanear Producto:</label>
                        <div class="input-con-boton">
                            <input type="text" id="buscadorVentas" placeholder="Código o Nombre...">
                            <button class="btn-camara">📷</button>
                        </div>
                    </div>
                    </div>
            </div>

            <div class="caja-blanca">
                <h3 style="margin-top:0; color: #000080;">Detalle de Factura</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Cant.</th>
                                <th>Producto</th>
                                <th>Precio Unit.</th>
                                <th>Subtotal</th>
                                <th>Quitar</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCarrito">
                            <tr>
                                <td>1</td>
                                <td>Cable HDMI Vention 2.1</td>
                                <td>$30.000</td>
                                <td>$30.000</td>
                                <td><button style="background:red; color:white; border:none; border-radius:4px; padding:5px;">X</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="total-venta">
                    TOTAL: $30.000
                </div>

                <button class="btn-main btn-cobrar">💵 REGISTRAR VENTA E IMPRIMIR RECIBO</button>
            </div>
        </div>
    </div>


    <div id="PestanaInventario" class="tab-content">
        <div class="caja-blanca">
            <h2 style="margin-top:0; color: #000080;">Ingreso de Mercancía</h2>
            <div class="form-group">
                <label for="idProducto">ID / Código de Barras:</label>
                <div class="input-con-boton">
                    <input type="text" id="idProducto" placeholder="Escanea el código o escríbelo manual">
                    <button type="button" class="btn-camara" onclick="iniciarEscaner()">📷 Escanear</button>
                </div>
                <div id="lector-codigo" style="width: 100%; max-width: 400px; margin: 10px auto; display: none; border: 2px solid #000080; border-radius: 8px; overflow: hidden;"></div>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre del Producto:</label>
                <input type="text" id="nombre" placeholder="Ej: Case Space Samsung A17">
            </div>
            <div class="form-group">
                <label for="compra">Valor de Compra ($):</label>
                <input type="number" id="compra" placeholder="Ej: 15000">
            </div>
            <div class="form-group">
                <label for="venta">Valor de Venta ($):</label>
                <input type="number" id="venta" placeholder="Ej: 30000">
            </div>
            <div class="form-group">
                <label for="stock">Cantidad en Stock a ingresar:</label>
                <input type="number" id="stock" placeholder="Ej: 10">
            </div>
            <button class="btn-main" onclick="guardarProducto()">Guardar / Sumar Producto</button>
        </div>

        <div class="caja-blanca">
            <h2 style="margin-top:0; color: #000080;">Base de Datos</h2>
            <div class="form-group">
                <input type="text" id="buscador" placeholder="🔍 Buscar por código o nombre..." onkeyup="filtrarTabla()" style="border: 2px solid #000080; border-radius: 20px;">
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Compra</th>
                            <th>Venta</th>
                            <th>Stock</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaInventario">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function abrirPestana(evt, nombrePestana) {
            // Ocultar todo el contenido
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
                tabcontent[i].classList.remove("active");
            }

            // Quitar clase "active" de los botones
            tablinks = document.getElementsByClassName("tab-links");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            // Mostrar la pestaña actual y añadir "active" al botón
            document.getElementById(nombrePestana).style.display = "block";
            document.getElementById(nombrePestana).classList.add("active");
            evt.currentTarget.className += " active";
        }
    </script>

    </body>
</html>
